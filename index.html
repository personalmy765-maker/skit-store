<!DOCTYPE html>
<html>
<head>
    <title>Skit Store</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            margin: 0;
            padding: 0;
        }

        h1 {
            color: white;
            background: #1f1f1f;
            padding: 20px;
            margin: 0;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin: auto;
            margin-top: 50px;
        }

        .card {
            display: block;
            background: #ffffff;
            margin: 15px 0;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            color: black;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }

        /* ✅ NEW STYLE FOR SAVED BUTTON */
        .saved-btn {
            display: block;
            background: #00c853;
            color: white;
            margin: 25px 0;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
        }

        .saved-btn:hover {
            background: #00b34a;
        }
    </style>

</head>
<body>

<h1>🎭 Skit Store</h1>

<div class="container">
    <a href="relationship.html" class="card">❤️ Relationship</a>
    <a href="pov.html" class="card">👀 POV</a>
    <a href="parents.html" class="card">🌍 African Parents</a>
    <a href="coffin.html" class="card">⚰️ Coffin Comedy</a>

    <!-- ✅ THIS IS THE NEW BUTTON -->

</div>

</body>
</html>
