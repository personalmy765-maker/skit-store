<!DOCTYPE html>
<html>
<head>
    <title>Skit Store</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            margin: 0;
            padding: 0;
            color: white;
        }

        h1 {
            background: #1f1f1f;
            padding: 20px;
            margin: 0;
            text-align: center;
        }

        /* SEARCH BAR */
        .search-box {
            width: 90%;
            max-width: 400px;
            margin: 20px auto 0;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin: auto;
            margin-top: 20px;
        }

        .card {
            display: block;
            background: #ffffff;
            margin: 15px 0;
            padding: 18px;
            border-radius: 15px;
            text-decoration: none;
            color: black;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }

        .saved-btn {
            display: block;
            background: #00c853;
            color: white;
            margin: 25px 0;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
        }

        .saved-btn:hover {
            background: #00b34a;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            font-size: 12px;
            margin: 30px 0;
            color: #aaa;
        }
    </style>
</head>

<body>

<h1>🎭 Skit Store</h1>

<!-- 🔍 SEARCH -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search categories...">
</div>

<div class="container" id="cardContainer">

    <a href="relationship.html" class="card">❤️ Relationship</a>
    <a href="pov.html" class="card">👀 POV</a>
    <a href="parents.html" class="card">🌍 African Parents</a>
    <a href="coffin.html" class="card">⚰️ Coffin Comedy</a>

    <a href="saved.html" class="saved-btn">💾 View Saved Skits</a>

</div>

<div class="footer">
    Built by you 🚀
</div>

<!-- ✅ SEARCH FUNCTION -->
<script>
let input = document.getElementById("searchInput");
let cards = document.querySelectorAll(".card");

input.addEventListener("keyup", function () {
    let value = input.value.toLowerCase();

    cards.forEach(card => {
        let text = card.textContent.toLowerCase();

        if (text.includes(value)) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
});
</script>

</body>
</html>
